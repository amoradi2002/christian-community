{% extends "base.html" %}
{% block title %}Scanner - TradeBot{% endblock %}
{% block extra_css %}
<style>
    .scan-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-bar {
        display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        padding: 12px 16px; background: var(--bg); border-radius: var(--radius);
        border: 1px solid var(--border); margin-bottom: 16px;
    }
    .filter-bar label { font-size: 12px; color: var(--text-muted); }
    .filter-bar select, .filter-bar input { padding: 6px 10px; font-size: 12px; }
    .signal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .signal-card {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 16px; position: relative;
        transition: border-color 0.15s, transform 0.15s;
    }
    .signal-card:hover { border-color: var(--accent-light); transform: translateY(-2px); }
    .signal-card-header {
        display: flex; justify-content: space-between; align-items: flex-start;
        margin-bottom: 12px;
    }
    .signal-symbol { font-size: 18px; font-weight: 700; color: var(--text-heading); }
    .signal-action {
        padding: 4px 12px; border-radius: 12px; font-size: 12px;
        font-weight: 700; text-transform: uppercase;
    }
    .signal-action-buy { background: var(--green-dim); color: var(--green); }
    .signal-action-sell { background: var(--red-dim); color: var(--red); }
    .signal-strategy { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .signal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .signal-meta-item { }
    .signal-meta-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .signal-meta-value { font-size: 14px; font-weight: 600; color: var(--text-heading); }
    .signal-conf-bar {
        height: 8px; background: var(--bg); border-radius: 4px;
        overflow: hidden; margin-top: 8px;
    }
    .signal-conf-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .signal-conf-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .signal-pattern {
        margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
        font-size: 12px; color: var(--text-muted);
    }
    .signal-pattern span { color: var(--yellow); font-weight: 500; }
    .watchlist-input { display: flex; gap: 8px; }
    .watchlist-input input { flex: 1; }
    .watchlist-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .watchlist-tag {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 4px 10px; background: var(--accent); border-radius: 12px;
        font-size: 12px; font-weight: 500; color: var(--text);
    }
    .watchlist-tag button {
        background: none; border: none; color: var(--red);
        cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
    }
    #scanStatus { font-size: 13px; margin-top: 8px; min-height: 20px; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Scanner</h1>
    <div class="scan-controls">
        <button class="btn btn-success" onclick="runScan('full')" id="btnFullScan">Full Scan</button>
        <button class="btn btn-primary" onclick="runScan('day')">Day Scan</button>
        <button class="btn btn-primary" onclick="runScan('swing')">Swing Scan</button>
    </div>
</div>
<div id="scanStatus"></div>

<!-- Watchlist Manager -->
<div class="card" style="margin-bottom:20px;">
    <div class="card-header">
        <span class="card-title">Watchlist</span>
    </div>
    <div class="watchlist-input">
        <input type="text" id="watchlistInput" placeholder="Add symbol (e.g. AAPL)" onkeypress="if(event.key==='Enter')addWatchlist()">
        <button class="btn btn-primary btn-sm" onclick="addWatchlist()">Add</button>
    </div>
    <div class="watchlist-tags" id="watchlistTags"></div>
</div>

<!-- Filters -->
<div class="filter-bar">
    <div>
        <label>Action</label><br>
        <select id="filterAction" onchange="applyFilters()">
            <option value="all">All</option>
            <option value="buy">BUY</option>
            <option value="sell">SELL</option>
        </select>
    </div>
    <div>
        <label>Style</label><br>
        <select id="filterStyle" onchange="applyFilters()">
            <option value="all">All</option>
            <option value="day">Day Trade</option>
            <option value="swing">Swing Trade</option>
        </select>
    </div>
    <div>
        <label>Min Confidence</label><br>
        <input type="range" id="filterConfidence" min="0" max="100" value="0" oninput="document.getElementById('confLabel').textContent=this.value+'%';applyFilters();" style="width:120px;">
        <span id="confLabel" style="font-size:12px;color:var(--text-muted);">0%</span>
    </div>
    <div>
        <label>Sort By</label><br>
        <select id="sortBy" onchange="applyFilters()">
            <option value="confidence">Confidence</option>
            <option value="symbol">Symbol</option>
            <option value="time">Time</option>
        </select>
    </div>
    <div style="margin-left:auto;">
        <span class="text-muted" style="font-size:12px;" id="signalCountLabel">0 signals</span>
    </div>
</div>

<!-- Signal Cards Grid -->
<div class="signal-grid" id="signalGrid">
    <div class="empty-state" style="grid-column:1/-1;">Loading signals...</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allSignals = [];
    let watchlist = JSON.parse(localStorage.getItem('watchlist') || '["SPY","AAPL","TSLA","NVDA","AMZN","META"]');

    function renderWatchlist() {
        document.getElementById('watchlistTags').innerHTML = watchlist.map(s =>
            '<span class="watchlist-tag">' + s + ' <button onclick="removeWatchlist(\'' + s + '\')">&times;</button></span>'
        ).join('');
    }

    function addWatchlist() {
        const input = document.getElementById('watchlistInput');
        const sym = input.value.trim().toUpperCase();
        if (sym && !watchlist.includes(sym)) {
            watchlist.push(sym);
            localStorage.setItem('watchlist', JSON.stringify(watchlist));
            renderWatchlist();
        }
        input.value = '';
    }

    function removeWatchlist(sym) {
        watchlist = watchlist.filter(s => s !== sym);
        localStorage.setItem('watchlist', JSON.stringify(watchlist));
        renderWatchlist();
    }

    async function refreshData() {
        const data = await apiFetch('/api/signals');
        if (data && Array.isArray(data)) {
            allSignals = data;
        } else {
            allSignals = [];
        }
        applyFilters();
        document.getElementById('lastScan').textContent = 'Last refresh: ' + fmtTime(new Date());
    }

    function applyFilters() {
        let filtered = [...allSignals];
        const action = document.getElementById('filterAction').value;
        const style = document.getElementById('filterStyle').value;
        const minConf = parseInt(document.getElementById('filterConfidence').value) / 100;
        const sortBy = document.getElementById('sortBy').value;

        if (action !== 'all') {
            filtered = filtered.filter(s => {
                const a = (s.signal || s.action || s.side || '').toLowerCase();
                if (action === 'buy') return a === 'buy' || a === 'long';
                return a === 'sell' || a === 'short';
            });
        }
        if (style !== 'all') {
            filtered = filtered.filter(s => {
                const st = (s.style || s.trade_type || s.timeframe || '').toLowerCase();
                return st.includes(style);
            });
        }
        filtered = filtered.filter(s => (s.confidence || s.score || 0) >= minConf);

        if (sortBy === 'confidence') {
            filtered.sort((a, b) => (b.confidence || b.score || 0) - (a.confidence || a.score || 0));
        } else if (sortBy === 'symbol') {
            filtered.sort((a, b) => (a.symbol || '').localeCompare(b.symbol || ''));
        } else if (sortBy === 'time') {
            filtered.sort((a, b) => new Date(b.timestamp || b.time || 0) - new Date(a.timestamp || a.time || 0));
        }

        document.getElementById('signalCountLabel').textContent = filtered.length + ' signal' + (filtered.length !== 1 ? 's' : '');
        renderSignalCards(filtered);
    }

    function renderSignalCards(signals) {
        const grid = document.getElementById('signalGrid');
        if (signals.length === 0) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No signals match your filters. Try running a scan.</div>';
            return;
        }
        grid.innerHTML = signals.map(s => {
            const action = (s.signal || s.action || s.side || 'BUY').toUpperCase();
            const isBuy = action === 'BUY' || action === 'LONG';
            const conf = (s.confidence || s.score || 0);
            const confPct = (conf * 100).toFixed(0);
            const entry = s.price || s.entry_price || 0;
            const stop = s.stop_loss || s.stop || 0;
            const target = s.target || s.target_price || 0;
            const rr = stop > 0 && entry > 0 && target > 0
                ? Math.abs((target - entry) / (entry - stop)).toFixed(1)
                : '--';
            const pattern = s.pattern || s.candle_pattern || '';
            const strategy = s.strategy || s.strategy_name || '--';
            const confColor = conf > 0.7 ? 'var(--green)' : conf > 0.4 ? 'var(--yellow)' : 'var(--red)';

            return '<div class="signal-card">' +
                '<div class="signal-card-header">' +
                    '<div>' +
                        '<div class="signal-symbol">' + (s.symbol || s.ticker || '--') + '</div>' +
                        '<div class="signal-strategy">' + strategy + '</div>' +
                    '</div>' +
                    '<span class="signal-action ' + (isBuy ? 'signal-action-buy' : 'signal-action-sell') + '">' + action + '</span>' +
                '</div>' +
                '<div class="signal-meta">' +
                    '<div class="signal-meta-item"><div class="signal-meta-label">Entry</div><div class="signal-meta-value">' + fmtMoney(entry) + '</div></div>' +
                    '<div class="signal-meta-item"><div class="signal-meta-label">Stop Loss</div><div class="signal-meta-value">' + (stop ? fmtMoney(stop) : '--') + '</div></div>' +
                    '<div class="signal-meta-item"><div class="signal-meta-label">Target</div><div class="signal-meta-value">' + (target ? fmtMoney(target) : '--') + '</div></div>' +
                    '<div class="signal-meta-item"><div class="signal-meta-label">R:R</div><div class="signal-meta-value">' + rr + (rr !== '--' ? ':1' : '') + '</div></div>' +
                '</div>' +
                '<div class="signal-conf-label"><span>Confidence</span><span>' + confPct + '%</span></div>' +
                '<div class="signal-conf-bar"><div class="signal-conf-fill" style="width:' + confPct + '%;background:' + confColor + ';"></div></div>' +
                (pattern ? '<div class="signal-pattern">Pattern: <span>' + pattern + '</span></div>' : '') +
            '</div>';
        }).join('');
    }

    async function runScan(type) {
        const status = document.getElementById('scanStatus');
        status.innerHTML = '<span class="loading-spinner"></span> Running ' + type + ' scan...';

        const data = await apiFetch('/api/signals');
        if (data && Array.isArray(data)) {
            allSignals = data;
            status.innerHTML = '<span class="text-green">Scan complete. Found ' + data.length + ' signals.</span>';
        } else {
            status.innerHTML = '<span class="text-yellow">Scan returned no new signals.</span>';
        }
        applyFilters();
        setTimeout(() => { status.textContent = ''; }, 8000);
    }

    renderWatchlist();
</script>
{% endblock %}
