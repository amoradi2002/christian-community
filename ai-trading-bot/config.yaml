bot:
  watchlist: ["AAPL", "MSFT", "GOOGL", "AMZN", "SPY", "QQQ"]
  scan_interval_minutes: 15
  confidence_threshold: 0.65

data:
  provider: alpaca          # "alpaca" for real-time or "yfinance" for free delayed data
  default_timeframe: 1d
  intraday_interval: 5m     # For day trading: 1m, 5m, 15m
  history_days: 365

trading:
  enabled: false            # Set to true to enable order execution
  paper: true               # Paper trading mode (safe to test)
  max_position_pct: 5       # Max % of portfolio per position
  default_order_type: limit # market, limit, or stop_limit

ai:
  model_type: gradient_boosting
  retrain_schedule: weekly
  lookahead_days: 5
  min_move_pct: 2.0

alerts:
  console:
    enabled: true
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    recipients: []
  discord:
    enabled: true
    webhook_url: ""  # Paste your Discord webhook URL here
  telegram:
    enabled: false

dashboard:
  host: 0.0.0.0
  port: 5000
  debug: false

database:
  path: data/trading_bot.db
