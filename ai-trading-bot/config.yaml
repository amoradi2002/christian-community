bot:
  watchlist: ["AAPL", "MSFT", "GOOGL", "AMZN", "SPY", "QQQ"]
  scan_interval_minutes: 15
  confidence_threshold: 0.65

data:
  provider: yfinance
  default_timeframe: 1d
  history_days: 365

ai:
  model_type: gradient_boosting
  retrain_schedule: weekly
  lookahead_days: 5
  min_move_pct: 2.0

alerts:
  console:
    enabled: true
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    recipients: []
  discord:
    enabled: true
  telegram:
    enabled: false

dashboard:
  host: 0.0.0.0
  port: 5000
  debug: false

database:
  path: data/trading_bot.db
