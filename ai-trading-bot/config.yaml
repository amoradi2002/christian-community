# ============================================================
# AI Trading Bot — Master Configuration
# ============================================================
# All thresholds, limits, and tunable parameters live here.
# No more hardcoded values buried in Python files.
# ============================================================

bot:
  watchlist: ["AAPL", "MSFT", "GOOGL", "AMZN", "NVDA", "META", "TSLA", "SPY", "QQQ", "IWM"]
  scan_interval_minutes: 15
  confidence_threshold: 0.65
  log_level: INFO                  # DEBUG, INFO, WARNING, ERROR

data:
  provider: alpaca                 # "alpaca" for real-time or "yfinance" for free delayed
  default_timeframe: 1d
  intraday_interval: 5m            # For day trading: 1m, 5m, 15m
  history_days: 365
  cache_ttl_minutes: 5             # How long to cache price data

# ─── Broker Routing ─────────────────────────────────────────
# Route trades to the right broker based on trade type.
# Available: alpaca, robinhood, fidelity, interactive_brokers
brokers:
  default: alpaca                  # Fallback broker for unrouted trades
  routing:
    options: robinhood             # Options trades → Robinhood
    day_trade: interactive_brokers # Day trades → Interactive Brokers
    swing_trade: fidelity          # Swing trades → Fidelity
    paper: alpaca                  # Paper trades → Alpaca (always)
  alpaca:
    paper: true
  robinhood:
    enabled: false                 # Enable after adding credentials to .env
  fidelity:
    enabled: false                 # Alert-only (no API) — import CSV positions
    csv_import_path: data/fidelity_positions.csv
  interactive_brokers:
    enabled: false
    host: "127.0.0.1"
    port: 7497                     # 7497=paper TWS, 7496=live TWS, 4001=IB Gateway
    client_id: 1
  tradingview:
    enabled: false
    webhook_secret: ""             # Set a secret to validate incoming webhooks

# ─── Trading Execution ──────────────────────────────────────
trading:
  enabled: false                   # Set to true to enable order execution
  paper: true                      # Paper trading mode (safe to test)
  max_position_pct: 5              # Max % of portfolio per position
  default_order_type: limit        # market, limit, or stop_limit
  slippage_pct: 0.05               # Estimated slippage per trade
  commission_per_trade: 0.00       # Per-trade commission ($0 for most brokers)
  commission_per_option: 0.65      # Per-contract option commission
  max_open_positions: 5
  auto_execute_signals: false      # Auto-place orders on high-confidence signals
  auto_execute_min_confidence: 0.80

# ─── AI Model ───────────────────────────────────────────────
ai:
  model_type: gradient_boosting    # gradient_boosting, random_forest
  retrain_schedule: weekly
  lookahead_days: 5
  min_move_pct: 2.0                # % move to classify as BUY/SELL
  max_adverse_pct: 1.0             # Max adverse move before labeling as failed
  walkforward_folds: 5             # Number of chronological folds for validation
  min_training_samples: 100        # Minimum samples to train a model
  feature_count: 40                # Expected feature vector size
  keep_models: 5                   # Number of historical models to retain
  hyperparameter_search: true      # Try multiple configs during training

# ─── Market Regime Detection ────────────────────────────────
regime:
  enabled: true
  benchmark: SPY                   # Symbol used as market proxy
  adx_trend_threshold: 25         # ADX above this = trending
  adx_range_threshold: 20         # ADX below this = ranging
  volatility_lookback: 252         # Days for volatility percentile calc
  crash_threshold: -3.0            # Daily % drop to flag as crash
  regime_check_interval: 60        # Minutes between regime checks
  risk_adjustments:
    bull_trend: 1.0
    bear_trend: 0.5
    bull_volatile: 0.7
    bear_volatile: 0.3
    ranging: 0.8
    breakout: 0.9
    crash: 0.2

# ─── Scanner Settings ───────────────────────────────────────
scanner:
  day_trade:
    min_gap_pct: 3.0               # Minimum gap % for day trade candidates
    min_volume_ratio: 2.0          # Volume vs 20-day average
    min_price: 5.0                 # Skip penny stocks
    max_price: 500.0
    min_float_millions: 10         # Skip micro-floats (too risky)
    max_float_millions: 500
    orb_candles: 3                 # Opening range = first N candles
  swing_trade:
    min_adr_pct: 2.0               # Minimum average daily range
    min_volume: 500000             # Minimum average daily volume
    max_holdings_days: 20          # Max days to hold a swing trade
  premarket:
    scan_start_hour: 4             # ET — when to start premarket scan
    scan_end_hour: 9               # ET — when to stop (market open at 9:30)
    min_gap_pct: 2.0
    min_volume_ratio: 1.5
    liquid_tickers: 36             # Number of liquid tickers to scan

# ─── Strategy Settings ──────────────────────────────────────
strategies:
  rsi_reversal:
    oversold: 30
    overbought: 70
    confirmation_candles: 1
  macd_crossover:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  bollinger_squeeze:
    period: 20
    std_dev: 2.0
    squeeze_threshold: 0.5        # BB width below this = squeeze
  pullback:
    max_pullback_pct: 80          # Max % giveback from recent high
    min_volume_dry: 0.6           # Volume should drop during pullback
  vwap_reclaim:
    tolerance_pct: 0.5            # Price within this % of VWAP
  gap_and_go:
    min_gap_pct: 3.0
    min_volume_surge: 2.0

# ─── Candlestick Patterns ───────────────────────────────────
candle_patterns:
  doji_body_pct: 0.10             # Max body as % of range for doji
  hammer_wick_ratio: 2.0          # Lower wick must be 2x+ the body
  engulfing_min_body_pct: 0.60    # Engulfing body must be 60%+ of range
  volume_confirmation: true        # Require above-average volume for patterns

# ─── Intelligence Scanner ───────────────────────────────────
intelligence:
  whale_flow:
    min_premium: 500000            # Minimum premium to flag as whale
    max_results: 100
  earnings:
    lookhead_days: 30              # Check earnings this far ahead
    urgency_levels:
      this_week: 7
      next_week: 14
      this_month: 30
  insider_buying:
    max_results: 20
  unusual_volume:
    max_results: 20
  rate_limit_seconds: 0.5         # Delay between API calls

# ─── Sentiment Analysis ─────────────────────────────────────
sentiment:
  phrase_weight: 0.20
  single_word_weight: 0.12
  very_strong_weight: 0.30
  negation_window: 3              # Words to check before keyword for negation
  source_weights:
    reuters: 1.5
    bloomberg: 1.5
    wsj: 1.3
    cnbc: 1.0
    yahoo: 0.8
    reddit: 0.5
    twitter: 0.5
  recency_weights:
    today: 1.0
    days_3: 0.7
    days_7: 0.4

# ─── Alerts & Notifications ─────────────────────────────────
alerts:
  cooldown_minutes: 30             # Don't repeat same signal within this window
  console:
    enabled: true
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    recipients: ["aaronmoradian@gmail.com"]
    daily_summary_time: "16:30"    # ET — after market close
    weekly_summary_day: sunday
    weekly_summary_time: "18:00"
  discord:
    enabled: true
    webhook_url: ""
  telegram:
    enabled: false
    smart_routing: true            # Auto-detect YouTube links, tickers, notes

# ─── Backtesting ────────────────────────────────────────────
backtest:
  default_initial_cash: 10000.0
  default_slippage_pct: 0.05
  default_commission: 0.00
  default_position_size_pct: 10   # % of portfolio per trade
  max_positions: 5
  benchmark: SPY
  monte_carlo_simulations: 1000
  walkforward:
    train_months: 12
    test_months: 3

# ─── Knowledge Crawler (24/7 Learning) ────────────────────────
knowledge_crawler:
  enabled: true
  youtube_interval_hours: 6          # Check YouTube channels every N hours
  news_interval_minutes: 30          # Check news sources every N minutes
  reddit_interval_hours: 2           # Check Reddit every N hours
  max_articles_per_run: 20           # Max articles to ingest per crawl
  max_videos_per_channel: 5          # Max recent videos per channel to check
  request_timeout: 15
  rate_limit_seconds: 2              # Delay between requests (be polite)

# ─── Knowledge Base ─────────────────────────────────────────
knowledge:
  min_relevance_score: 0.3        # Min score for a sentence to be extracted
  dedup_similarity_threshold: 0.7 # Jaccard similarity above this = duplicate
  min_rule_confidence: 0.3        # Minimum confidence to store a rule
  max_rules_per_source: 50        # Don't extract more than this from one source
  categories:
    - entry_rules
    - exit_rules
    - risk_rules
    - market_structure
    - psychology
    - indicator_usage
    - pattern_rules

# ─── Dashboard ──────────────────────────────────────────────
dashboard:
  host: 0.0.0.0
  port: 5000
  debug: false
  auto_refresh_seconds: 30
  theme: dark                      # dark or light

# ─── Database ───────────────────────────────────────────────
database:
  path: data/trading_bot.db
